name: Update README

on:
  push:
    branches: [main]
    paths:
      - "README.template.md"
      - "src/**"
      - "img/**"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm run generate

      - name: Commit changes
        run: |
          git config user.name "${{ secrets.GIT_NAME }}"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add README.md
          git diff --staged --quiet || git commit -m "Update README on file changes"
          git push

