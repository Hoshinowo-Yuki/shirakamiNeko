name: Update README

on:
  push:
    branches: [main]
    paths:
      - "README.template.md"
      - "src/**"
      - "img/**"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm run generate

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Commit changes
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          git config user.name "${{ secrets.GIT_NAME }}"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git config commit.gpgsign true
          git config user.signingkey "${{ secrets.GPG_KEY_ID }}"
          git config gpg.program "$(which gpg)"
          echo "Commiting via GPG" | gpg --batch --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" --clearsign > /dev/null
          git add README.md
          git diff --staged --quiet || git commit -S -m "Update README on file changes"
          git push