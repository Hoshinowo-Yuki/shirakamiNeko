name: Update README

on:
  push:
    branches: [main]
    paths:
      - "README.template.md"
      - "src/**"
      - "img/**"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm run generate

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if git diff --quiet README.md; then
            echo "No changes"
            exit 0
          fi

          SHA=$(git rev-parse HEAD)
          BLOB=$(gh api repos/${{ github.repository }}/git/blobs \
            -f content="$(base64 -w 0 README.md)" \
            -f encoding="base64" \
            --jq '.sha')
          TREE=$(gh api repos/${{ github.repository }}/git/trees \
            -f base_tree="$SHA" \
            -f 'tree[][path]=README.md' \
            -f 'tree[][mode]=100644' \
            -f 'tree[][type]=blob' \
            -f "tree[][sha]=$BLOB" \
            --jq '.sha')
          COMMIT=$(gh api repos/${{ github.repository }}/git/commits \
            -f message="Update README on file changes" \
            -f tree="$TREE" \
            -f 'parents[]='"$SHA" \
            --jq '.sha')
          gh api repos/${{ github.repository }}/git/refs/heads/main \
            -X PATCH -f sha="$COMMIT"